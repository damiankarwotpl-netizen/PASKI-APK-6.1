name: Build Paski Future 1.0 APK
 
on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: "Build variant"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
 
jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
 
    steps:
      - uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
 
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ---------- CACHE (NOWE) ----------

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Cache Android SDK/NDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android/platform
          key: android-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            android-${{ runner.os }}-

      # ---------- INSTALL ----------
      
      - name: Clean project
        run: |
            rm -rf .buildozer
            rm -rf bin
            rm -rf ~/.buildozer
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev

      - name: Install Buildozer toolchain
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install buildozer==1.5.0 cython==0.29.36

      # ---------- SDK INIT ----------

      - name: Initialize Android SDK/NDK
        run: |
          mkdir -p artifacts
          (yes || true) | buildozer android update 2>&1 | tee artifacts/buildozer-update.log
          exit ${PIPESTATUS[1]}

      # ---------- LICENSE ACCEPT ----------

      - name: Accept Android SDK licenses
        run: |
          accepted=0
          for sdk_root in \
            "$ANDROID_SDK_ROOT" \
            "$ANDROID_HOME" \
            "$HOME/.buildozer/android/platform/android-sdk"; do
            for candidate in \
              "$sdk_root/cmdline-tools/latest/bin/sdkmanager" \
              "$sdk_root/cmdline-tools/tools/bin/sdkmanager" \
              "$sdk_root/tools/bin/sdkmanager"; do
              if [ -x "$candidate" ]; then
                yes | "$candidate" --licenses
                accepted=1
                break
              fi
            done
            if [ "$accepted" -eq 1 ]; then
              break
            fi
          done
          if [ "$accepted" -eq 0 ]; then
            echo "sdkmanager not found; continuing because Buildozer may manage licenses internally."
          fi

      # ---------- BUILD APK ----------

      - name: Build APK
        run: |
          mkdir -p artifacts
          (yes || true) | buildozer android debug 2>&1 | tee artifacts/buildozer.log
          exit ${PIPESTATUS[1]}

      # ---------- LOGS ----------

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-logs
          path: |
            artifacts/buildozer-update.log
            artifacts/buildozer.log
          if-no-files-found: warn

      # ---------- APK ----------

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: paski-future-1-0-apk
          path: bin/*.apk
          if-no-files-found: error
