name: Android CI (fast)

on:
  workflow_dispatch:
  push:
    branches: [main, work]
  pull_request:
    branches: [main]

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_NO_PYTHON_VERSION_WARNING: "1"
      USE_CCACHE: "1"
      CCACHE_DIR: ~/.ccache
      BUILDOZER_WARN_ON_ROOT: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Cache Buildozer / p4a / Gradle / ccache
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.ccache
          key: ${{ runner.os }}-android-fast-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-android-fast-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ccache \
            git \
            libffi-dev \
            libssl-dev \
            libsqlite3-dev \
            libjpeg-dev \
            zlib1g-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install --upgrade cython==0.29.36 buildozer

      - name: CI fast profile tweaks
        run: |
          # Jedna architektura znacząco skraca czas kompilacji.
          sed -i 's/^android.archs\s*=.*/android.archs = arm64-v8a/' buildozer.spec

      - name: Build debug APK (faster path)
        run: |
          buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: future-android-apk
          path: bin/*.apk
          if-no-files-found: error
