name: Build Paski Future 1.0 APK
 
on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: "Build variant"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
 
jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
 
    steps:
      - uses: actions/checkout@v4

      # ---------- OMEGA CHANGE DETECTOR ----------

      - name: Detect source changes
        id: changes
        run: |
          git fetch origin || true
          CHANGED=$(git diff --name-only HEAD~1 HEAD || true)

          NEED_CLEAN=0

          if echo "$CHANGED" | grep -E "main.py|buildozer.spec|requirements"; then
            NEED_CLEAN=1
          fi

          echo "need_clean=$NEED_CLEAN" >> $GITHUB_OUTPUT

      # ---------- VERSION ----------

      - name: Set build version
        run: |
          echo "APP_VERSION=1.0.${{ github.run_number }}" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
 
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ---------- CACHE ----------

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec','main.py') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Cache Android SDK/NDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android/platform
          key: android-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}

      # ---------- AUTO CLEAN ----------

      - name: Clean project (AUTO)
        if: steps.changes.outputs.need_clean == '1'
        run: |
            echo "Source changed -> cleaning"
            rm -rf .buildozer
            rm -rf bin
            rm -rf ~/.buildozer

      # ---------- SYSTEM INFO ----------

      - name: Collect system info
        run: |
          mkdir -p artifacts
          uname -a > artifacts/system-info.log
          env > artifacts/environment.log

      # ---------- INSTALL ----------

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev

      - name: Install Buildozer toolchain
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install buildozer==1.5.0 cython==0.29.36

      # ---------- OMEGA TURBO BUILD ----------

      - name: Enable turbo compile
        run: |
          echo "MAKEFLAGS=-j$(nproc)" >> $GITHUB_ENV
          echo "GRADLE_OPTS=-Dorg.gradle.parallel=true" >> $GITHUB_ENV

      # ---------- SDK INIT ----------

      - name: Initialize Android SDK/NDK
        run: |
          mkdir -p artifacts
          (yes || true) | buildozer android update 2>&1 | tee artifacts/buildozer-update.log
          exit ${PIPESTATUS[1]}

      # ---------- BUILD ----------

      - name: Build APK
        run: |
          mkdir -p artifacts
          (yes || true) | buildozer android debug 2>&1 | tee artifacts/buildozer.log

      # ---------- CRASH REPORT ----------

      - name: Generate crash report
        if: failure()
        run: |
          mkdir -p artifacts
          echo "BUILD FAILED $(date)" > artifacts/crash-report.log
          tail -n 200 artifacts/buildozer.log >> artifacts/crash-report.log || true

      # ---------- LOGS ----------

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            artifacts/*
          if-no-files-found: warn

      # ---------- APK ----------

      - name: Find APK
        run: |
            find . -name "*.apk"

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: paski-future-build
          path: |
            path: |
               .buildozer/**/*.apk
